services:
  db:
    image: postgres:16-alpine
    container_name: mis_eventos_db
    environment:
      POSTGRES_DB: mis_eventos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mis_eventos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mis_eventos_backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/mis_eventos
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mis_eventos_frontend
    env_file:
      - ./frontend/.env.example
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - ./docs:/app/public/docs:ro
      - frontend_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    container_name: mis_eventos_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  frontend_node_modules:
